name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Fixture MCP servers under testdata/ are Node scripts; without this,
      # cmd/mcpxray's fixture tests skip rather than fail (t.Skip when
      # `node` isn't on PATH), which would silently hide regressions in CI.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
